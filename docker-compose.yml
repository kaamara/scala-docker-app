version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: db-1
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mojabaza
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mojabaza"]
      interval: 5s
      timeout: 5s
      retries: 5

  scala-app:
    build: .
    container_name: scala-app-1
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_URL=jdbc:postgresql://db:5432/mojabaza
      - DB_USER=user
      - DB_PASSWORD=password
    ports:
      - "8081:8081"
    restart: on-failure

  frontend:
    image: nginx:alpine
    container_name: frontend-1
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html